{% extends 'users/base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto mt-12 relative z-10 group">
    <!-- Massive decorative glow -->
    <div class="absolute inset-0 bg-gradient-to-r from-cyan-500/20 to-blue-600/20 rounded-[2rem] blur-3xl group-hover:blur-2xl transition-all duration-700"></div>

    <div class="backdrop-blur-xl bg-slate-900/70 shadow-2xl shadow-[0_0_50px_rgba(6,182,212,0.15)] border border-slate-700/50 rounded-[2rem] overflow-hidden text-center relative z-10 transform transition-all">
        <div class="bg-gradient-to-br from-cyan-600/90 to-blue-700/90 py-12 px-6 relative overflow-hidden">
            <!-- Background pattern -->
            <div class="absolute inset-0 opacity-20 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAiIGhlaWdodD0iNjAiIHZpZXdCb3g9IjAgMCA2MCA2MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48ZyBmaWxsPSJub25lIiBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxwYXRoIGQ9Ik0zNiAzNHYtbDItMiAybDJ2MmgtNHptMC0xNGwtMiAydjJoNHYtMmwtMi0yeiIgZmlsbD0iI2ZmZiIvPjwvZz48L3N2Zz4=')]"></div>
            
            <svg class="mx-auto h-20 w-20 text-white mb-6 drop-shadow-[0_0_15px_rgba(255,255,255,0.4)] animate-bounce" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <h2 class="text-4xl md:text-5xl font-black text-white tracking-tight drop-shadow-md">Quiz Completed!</h2>
            <p class="mt-3 text-cyan-100 text-lg font-medium">You have successfully submitted "<span class="font-bold text-white">{{ attempt.quiz.title }}</span>"</p>
        </div>
        
        <div class="px-6 py-10">
            <h3 class="text-xl font-bold text-slate-300 mb-8 border-b border-slate-800 pb-4 inline-block px-10">Diagnostic Results</h3>
            
            <div class="grid grid-cols-2 gap-6 max-w-lg mx-auto mb-10">
                <div class="bg-slate-800/50 border border-slate-700/50 rounded-2xl p-6 transition-all hover:bg-slate-800 hover:-translate-y-1 hover:shadow-lg hover:shadow-cyan-900/20">
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Total Score</p>
                    <p class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-br from-cyan-400 to-blue-500">{{ attempt.score }} <span class="text-xl text-slate-500 font-bold inline-block ml-1">/ {{ total_questions }}</span></p>
                </div>
                
                <div class="bg-slate-800/50 border border-slate-700/50 rounded-2xl p-6 transition-all hover:bg-slate-800 hover:-translate-y-1 hover:shadow-lg hover:shadow-purple-900/20">
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Time Taken</p>
                    <p class="text-5xl font-black text-slate-200">{{ attempt.time_taken_seconds }}<span class="text-xl text-slate-500 font-bold inline-block ml-1">s</span></p>
                </div>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="{% url 'quiz_list' %}" class="inline-flex justify-center items-center px-8 py-3 border border-slate-600 shadow-sm text-base font-bold rounded-xl text-slate-300 bg-slate-800 hover:bg-slate-700 hover:text-white focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900 focus:ring-slate-500 transition-all">
                    Dashboard
                </a>
                <a href="{% url 'quiz_leaderboard' attempt.quiz.id %}" class="inline-flex justify-center items-center px-8 py-3 border border-transparent shadow-[0_0_15px_rgba(250,204,21,0.2)] text-base font-bold rounded-xl text-yellow-900 bg-gradient-to-r from-yellow-400 to-amber-500 hover:from-yellow-300 hover:to-amber-400 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900 focus:ring-yellow-500 transition-all transform hover:-translate-y-0.5">
                    <svg class="mr-2 h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                    View Leaderboard
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
