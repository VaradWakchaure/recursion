{% extends 'users/base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto mt-8">
    <div class="bg-white shadow-sm border border-gray-100 rounded-xl overflow-hidden text-center">
        <div class="bg-blue-600 py-8 px-4 sm:px-6">
            <svg class="mx-auto h-16 w-16 text-white mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <h2 class="text-3xl font-bold text-white">Quiz Completed!</h2>
            <p class="mt-2 text-blue-100 text-lg">You have successfully submitted "{{ attempt.quiz.title }}"</p>
        </div>
        
        <div class="px-6 py-8">
            <h3 class="text-xl font-medium text-gray-900 mb-6 border-b border-gray-100 pb-4">Your Results</h3>
            
            <div class="grid grid-cols-2 gap-4 max-w-md mx-auto mb-8">
                <div class="bg-gray-50 border border-gray-100 rounded-lg p-4">
                    <p class="text-sm font-medium text-gray-500 uppercase tracking-wider mb-1">Score</p>
                    <p class="text-3xl font-bold text-blue-600">{{ attempt.score }} <span class="text-lg text-gray-400 font-normal">/ {{ total_questions }}</span></p>
                </div>
                
                <div class="bg-gray-50 border border-gray-100 rounded-lg p-4">
                    <p class="text-sm font-medium text-gray-500 uppercase tracking-wider mb-1">Time Taken</p>
                    <p class="text-3xl font-bold text-gray-900">{{ attempt.time_taken_seconds }}<span class="text-lg text-gray-400 font-normal">s</span></p>
                </div>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-3 justify-center">
                <a href="{% url 'quiz_list' %}" class="inline-flex justify-center items-center px-6 py-3 border border-gray-300 shadow-sm text-base font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                    Back to Quizzes
                </a>
                <a href="{% url 'quiz_leaderboard' attempt.quiz.id %}" class="inline-flex justify-center items-center px-6 py-3 border border-transparent shadow-sm text-base font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                    <svg class="mr-2 h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                    View Leaderboard
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
