<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recursion by RSCOE</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Minimal custom tweaks */
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f8f9fa; }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col">
    <header class="bg-gray-900 border-b border-gray-800">
        <div class="container mx-auto px-4 max-w-6xl">
            <nav class="flex items-center justify-between h-16">
                <a href="{% url 'quiz_list' %}" class="text-xl font-bold text-white tracking-tight">Recursion<span class="text-blue-500">_</span></a>
                <div class="flex items-center space-x-4 md:space-x-6 text-sm text-gray-300">
                    {% if user.is_authenticated %}
                        <span class="hidden md:inline">Hello, <span class="font-semibold text-white">{{ user.username }}</span></span>
                        <a href="{% url 'dashboard' %}" class="hover:text-white transition-colors">Dashboard</a>
                        <a href="{% url 'quiz_list' %}" class="hover:text-white transition-colors">Quizzes</a>
                        {% if user.is_staff %}
                            <a href="{% url 'admin:index' %}" class="text-yellow-500 hover:text-yellow-400 font-medium hidden md:inline">Admin</a>
                        {% endif %}
                        <form action="{% url 'logout' %}" method="post" class="inline">
                            {% csrf_token %}
                            <button type="submit" class="bg-gray-800 hover:bg-gray-700 text-white px-3 md:px-4 py-1.5 rounded-md transition-colors border border-gray-700">Logout</button>
                        </form>
                    {% else %}
                        <a href="{% url 'login' %}" class="hover:text-white transition-colors">Login</a>
                        <a href="{% url 'signup' %}" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-1.5 rounded-md transition-colors font-medium">Sign Up</a>
                    {% endif %}
                </div>
            </nav>
        </div>
    </header>
    
    <main class="flex-grow container mx-auto px-4 max-w-5xl py-8 md:py-12">
        {% block content %}
        {% endblock content %}
    </main>

    <footer class="bg-gray-100 border-t border-gray-200 mt-auto py-6">
        <div class="container mx-auto px-4 text-center text-gray-500 text-sm font-medium">
            &copy; 2026 Recursion by RSCOE. Built with Django & Tailwind.
        </div>
    </footer>
</body>
</html>
